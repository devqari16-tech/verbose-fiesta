<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | AFG555TOWING - Toronto Emergency Towing Service</title>
    <meta name="description" content="Page not found. Contact AFG555TOWING for 24/7 emergency towing and roadside assistance in Toronto GTA. Call (647) 819-4452 for immediate help.">
    <meta name="keywords" content="towing service Toronto, emergency towing, roadside assistance, AFG555TOWING">
    <meta name="robots" content="noindex, follow">
    <link href="style.css" rel="stylesheet" type="text/css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            color: white;
            text-align: center;
            padding: 20px;
        }

        .error-content {
            max-width: 600px;
            animation: fadeInUp 0.8s ease-out;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #0099ff 0%, #00ccff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            line-height: 1;
        }

        .error-title {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #0099ff;
        }

        .error-description {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #ccc;
            line-height: 1.6;
        }

        .error-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-home {
            background: linear-gradient(135deg, #0099ff 0%, #00ccff 100%);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.4s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0, 153, 255, 0.5);
        }

        .btn-contact {
            background: transparent;
            color: #0099ff;
            border: 2px solid #0099ff;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.4s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-contact:hover {
            background: #0099ff;
            color: white;
            transform: translateY(-3px);
        }

        .tow-truck-icon {
            font-size: 4rem;
            color: #0099ff;
            margin-bottom: 30px;
            animation: bounce 2s infinite;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
            60% {
                transform: translateY(-5px);
            }
        }

        @media (max-width: 768px) {
            .error-code {
                font-size: 6rem;
            }
            .error-title {
                font-size: 2rem;
            }
            .error-buttons {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-content">
            <div class="tow-truck-icon">
                <i class="fas fa-truck"></i>
            </div>
            <div class="error-code">404</div>
            <h1 class="error-title">Oops! Page Not Found</h1>
            <p class="error-description">
                Looks like this page took a wrong turn! Just like a broken-down vehicle, 
                sometimes we end up in places we didn't expect. Don't worry - our emergency 
                response team is here to get you back on track.
            </p>
            <div class="error-buttons">
                <a href="/" class="btn-home">
                    <i class="fas fa-home"></i>
                    <span>Back to Home</span>
                </a>
                <a href="tel:+16478194452" class="btn-contact">
                    <i class="fas fa-phone"></i>
                    <span>Emergency Call</span>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
